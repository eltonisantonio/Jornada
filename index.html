        '<strong>Opção 2 — Python:</strong><br>Abra o terminal na pasta do arquivo e execute:<br>' +

// ─── HASH simples (não criptografia forte, suficiente para uso interno) ───
async function hashPass(p){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function fmtD(str){if(!str)return'—';try{const d=new Date(str+'T12:00');return d.toLocaleDateString('pt-BR');}catch{return str;}}
// ISO (yyyy-mm-dd) → pt-BR (dd/mm/yyyy) para exibição
function isoToBR(iso){if(!iso)return'—';try{const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}catch{return iso;}}
// pt-BR (dd/mm/yyyy) → ISO (yyyy-mm-dd) para input[type=date]
function brToISO(br){if(!br||br==='—')return'';try{const[d,m,y]=br.split('/');return`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;}catch{return'';}}
function prazoInfo(des){
  if(!des||des==='—')return{cls:'',lbl:''};
  try{
    // Aceita tanto ISO (yyyy-mm-dd) quanto pt-BR (dd/mm/yyyy)
    let dt;
    if(des.includes('-')){dt=new Date(des+'T12:00');}
    else{const[d,m,y]=des.split('/');dt=new Date(+y,+m-1,+d);}
    const diff=Math.ceil((dt-new Date())/(864e5));
    if(diff<0)return{cls:'pve',lbl:`⚠ ${Math.abs(diff)}d atraso`};
    if(diff===0)return{cls:'pal',lbl:'⚠ Hoje'};
    if(diff<=3)return{cls:'pal',lbl:`⚠ ${diff}d`};
    return{cls:'pok',lbl:`${diff}d`};
  }catch{return{cls:'',lbl:''};}
}

function startListeners(){
  S.listeners.forEach(u=>u());S.listeners=[];
  const sub=(col,cb)=>S.listeners.push(db.collection(col).onSnapshot(snap=>{cb(snap.docs.map(d=>({id:d.id,...d.data()})));render();}));
  sub('sectors',d=>{S.sectors=d.sort((a,b)=>(a.order||99)-(b.order||99));});
  sub('profiles',d=>{S.profiles=d.sort((a,b)=>(a.order||99)-(b.order||99));if(!S.profileEditTab&&d.length)S.profileEditTab=d[0].key;});
  sub('items',d=>{S.iLib=d.sort((a,b)=>(a.order||99)-(b.order||99));});
  sub('processes',d=>{S.processes=d;});
  sub('users',d=>{S.users=d;});
}

async function logHist(pid,action,detail){
  await db.collection('processes').doc(pid).collection('history').add({action,detail,user:S.session?.name||'—',sectorId:S.session?.sectorId||'rh',ts:firebase.firestore.FieldValue.serverTimestamp()});
}

function render(){
  if(!db){return;}

  document.getElementById('root').innerHTML=renderApp();
  bindApp();
}

function renderLogin(){
  document.getElementById('root').innerHTML=`<div class="lw"><div class="lc">
    <div class="ll">${LOGO}<p>Gestão de Checklist de Desligamento</p></div>
    ${S.loginError?`<div class="le">${S.loginError}</div>`:''}
    <div class="fg"><label>Usuário</label><input type="text" id="lu" placeholder="Seu usuário" autocomplete="username"/></div>
    <div class="fg"><label>Senha</label><input type="password" id="lp" placeholder="Sua senha" autocomplete="current-password"/></div>
    <button class="bl" id="blbtn">Entrar</button>
  </div></div>`;
  const doLogin=async()=>{
    const usr=g('lu')?.value.trim().toLowerCase();
    const pass=g('lp')?.value;
    if(!usr||!pass){S.loginError='Preencha usuário e senha.';renderLogin();return;}
    g('blbtn').textContent='Entrando...';g('blbtn').disabled=true;
    try{
      const hash=await hashPass(pass);
      // Busca usuário pelo campo "username"
      const snap=await db.collection('users').get();
      const found=snap.docs.map(d=>({id:d.id,...d.data()})).find(u=>u.username===usr);
      if(!found||found.passHash!==hash){S.loginError='Usuário ou senha incorretos.';renderLogin();return;}
      S.session={uid:found.id,name:found.name,sectorId:found.sectorId,role:found.role};
      render();
    }catch(e){S.loginError='Erro: '+e.message;renderLogin();}
  };
  if(g('blbtn'))g('blbtn').onclick=doLogin;
  if(g('lp'))g('lp').onkeydown=e=>{if(e.key==='Enter')doLogin();};
  if(g('lu'))g('lu').onkeydown=e=>{if(e.key==='Enter')g('lp')?.focus();};
}

// ─── PDF ────────────────────────────────────────────────────
function gerarPDF(p){
  try{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const W=210,M=18;let y=18;
    doc.setFillColor(2,79,43);doc.rect(0,0,W,38,'F');doc.setFillColor(115,150,48);doc.rect(W-45,0,45,38,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('raguife',M,24);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('CONFIANÇA QUE INSPIRA',M,32);doc.setFontSize(9);doc.text('Checklist de Desligamento',W-M-55,22);doc.text('Gerado: '+new Date().toLocaleDateString('pt-BR'),W-M-55,30);
    y=50;doc.setTextColor(2,79,43);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('DADOS DO COLABORADOR',M,y);y+=5;
    doc.setDrawColor(115,150,48);doc.line(M,y,W-M,y);y+=6;
    const flds=[['Nome',p.nome],['Cargo',p.cargo],['Departamento',p.depto],['Admissão',isoToBR(p.admissao)],['Desligamento',isoToBR(p.desligamento)],['Tipo',p.tipo],['Aviso',p.aviso||'—'],['Perfil',(p.profiles||[]).map(k=>getProf(k).name).join(', ')||'—']];
    const h2=Math.ceil(flds.length/2);let y1=y,y2=y;
    flds.slice(0,h2).forEach(([l,v])=>{doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(102,102,102);doc.text(l.toUpperCase(),M,y1);y1+=4;doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(26,29,35);doc.text(String(v||'—'),M,y1);y1+=8;});
    flds.slice(h2).forEach(([l,v])=>{doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(102,102,102);doc.text(l.toUpperCase(),110,y2);y2+=4;doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(26,29,35);doc.text(String(v||'—'),110,y2);y2+=8;});
    y=Math.max(y1,y2)+4;
    if(p.homologacaoData?.data||p.homologacaoData?.responsavel){doc.setFillColor(220,240,220);doc.roundedRect(M,y-3,W-2*M,20,2,2,'F');doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(2,79,43);doc.text('HOMOLOGAÇÃO',M+4,y+4);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(26,29,35);doc.text(`Data: ${isoToBR(p.homologacaoData?.data)}   Local: ${p.homologacaoData.local||'—'}   Resp: ${p.homologacaoData.responsavel||'—'}`,M+4,y+12);if(p.homologacaoData.obs){y+=18;doc.setFontSize(8);doc.setTextColor(102,102,102);doc.text('Obs: '+p.homologacaoData.obs,M+4,y+4);}y+=26;}
    allSecs().forEach(sec=>{const items=secItems(p,sec);if(!items.length)return;if(y>262){doc.addPage();y=18;}doc.setFillColor(232,242,232);doc.roundedRect(M,y-4,W-2*M,11,2,2,'F');doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(2,79,43);doc.text(getSec(sec).name,M+4,y+4);y+=14;items.forEach(it=>{if(y>272){doc.addPage();y=18;}const ck=(p.checks||{})[it.id];const done=ck?.done;doc.setFillColor(done?115:200,done?150:200,done?48:200);doc.circle(M+2.5,y-1.5,2.5,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(done?40:80,done?40:80,done?40:80);const lines=doc.splitTextToSize(it.text,W-2*M-14);doc.text(lines,M+9,y);let ex=lines.length*4.5;if(done){let meta=[];if(ck.date)meta.push('Data: '+ck.date);if(ck.resp)meta.push('Resp: '+ck.resp);if(meta.length){y+=ex;doc.setFontSize(8);doc.setTextColor(102,102,102);doc.text('  '+meta.join(' · '),M+9,y);ex=5;}if(ck.obs){y+=ex;const ol=doc.splitTextToSize('  Obs: '+ck.obs,W-2*M-14);doc.text(ol,M+9,y);ex=ol.length*4.5;}}y+=ex+3;});y+=2;});
    const pg=doc.internal.getNumberOfPages();for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFillColor(2,79,43);doc.rect(0,288,W,9,'F');doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(255,255,255);doc.text('Raguife — Documento Confidencial',M,294);doc.text(`Pág ${i}/${pg}`,W-M-16,294);}
    doc.save(`Desligamento_${(p.nome||'').replace(/ /g,'_')}.pdf`);
  }catch(e){alert('Erro PDF: '+e.message);}
}

// ─── BIND ────────────────────────────────────────────────────
function saveFForm(){
  if(g('fn'))S.nf.nome=g('fn').value;if(g('fc'))S.nf.cargo=g('fc').value;
  if(g('fd'))S.nf.depto=g('fd').value;if(g('fa'))S.nf.admissao=g('fa').value;
  if(g('fdes'))S.nf.desligamento=g('fdes').value;if(g('fav'))S.nf.aviso=g('fav').value;
}

function bindApp(){
  // LOGOUT
  if(g('btn-logout'))g('btn-logout').onclick=()=>{S.session=null;S.loginError='';render();};

  // BACK
  if(g('btn-back'))g('btn-back').onclick=()=>{S.screen='dashboard';render();};

  // NOVO PROCESSO
  if(g('btn-new'))g('btn-new').onclick=()=>{S.showModal=true;S.modalMode='new';S.modalTab='dados';S.nf={nome:'',cargo:'',depto:'',admissao:'',desligamento:'',tipo:'',aviso:'',profiles:[]};S.newEnabled=[];S.secBlockOpen={};render();};

  // ABRIR MODAIS
  if(g('btn-profiles'))g('btn-profiles').onclick=()=>{S.showModal=true;S.modalMode='profiles';S.secBlockOpen={};render();};
  if(g('btn-users'))g('btn-users').onclick=()=>{S.showModal=true;S.modalMode='users';S.editUserId=null;render();};
  if(g('btn-sectors'))g('btn-sectors').onclick=()=>{S.showModal=true;S.modalMode='sectors';render();};
  if(g('btn-edit-items'))g('btn-edit-items').onclick=()=>{S.showModal=true;S.modalMode='edit-items';S.secBlockOpen={};render();};
  if(g('btn-hist'))g('btn-hist').onclick=async()=>{
    S.hist=[];S.showModal=true;S.modalMode='history';render();
    const snap=await db.collection('processes').doc(S.currentProcess).collection('history').orderBy('ts','desc').get();
    S.hist=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  };

  // SEARCH
  if(g('srch-inp'))g('srch-inp').oninput=e=>{S.searchText=e.target.value;render();};
  if(g('srch-st'))g('srch-st').onchange=e=>{S.filterStatus=e.target.value;render();};

  // TABS
  on('[data-tab]','click',e=>{S.tab=e.currentTarget.dataset.tab;render();});

  // ABRIR PROCESSO
  on('[data-open]','click',e=>{S.currentProcess=e.currentTarget.dataset.open;S.screen='checklist';S.secOpen={};allSecs().forEach(s=>{S.secOpen[s]=true;});render();});

  // EXCLUIR PROCESSO
  on('[data-del]','click',async e=>{
    if(!confirm('Excluir processo?'))return;
    await db.collection('processes').doc(e.currentTarget.dataset.del).delete();
    showAlert('Processo excluído.','w');
  });

  // DUPLICAR
  on('[data-dup]','click',async e=>{
    const p=S.processes.find(x=>x.id===e.currentTarget.dataset.dup);if(!p)return;
    const{id:_,...r}=p;
    const nov={...r,nome:r.nome+' (cópia)',finalizado:false,criadoEm:new Date().toISOString(),checks:mkChecks(r.enabledItems||[])};
    const ref=await db.collection('processes').add(nov);
    await logHist(ref.id,'create',`Duplicado de: ${p.nome}`);
    showAlert('Processo duplicado!');
  });

  // TOGGLE SEÇÃO
  on('[data-sec]','click',e=>{S.secOpen[e.currentTarget.dataset.sec]=!S.secOpen[e.currentTarget.dataset.sec];render();});

  // CHECKBOX ITEM
  on('[data-ck]','change',async e=>{
    const p=S.processes.find(x=>x.id===S.currentProcess);if(!p)return;
    const id=e.currentTarget.dataset.ck;const done=e.currentTarget.checked;
    const checks={...(p.checks||{}),[id]:{...(p.checks?.[id]||{}),done}};
    if(!done){checks[id].date='';checks[id].resp='';checks[id].obs='';}
    await db.collection('processes').doc(p.id).update({checks});
    const it=S.iLib.find(x=>x.id===id);
    await logHist(p.id,done?'check':'uncheck',`${done?'✅':'⬜'} ${it?.text||id}`);
    render();
  });

  // CAMPOS DATA/RESP/OBS
  on('[data-fi]','change',async e=>{
    const p=S.processes.find(x=>x.id===S.currentProcess);if(!p)return;
    const id=e.currentTarget.dataset.fi,ff=e.currentTarget.dataset.ff;
    const checks={...(p.checks||{}),[id]:{...(p.checks?.[id]||{done:true})}};
    checks[id][ff]=e.currentTarget.value;
    await db.collection('processes').doc(p.id).update({checks});
  });

  // FINALIZAR
  if(g('btn-finalizar'))g('btn-finalizar').onclick=async()=>{
    const p=S.processes.find(x=>x.id===S.currentProcess);if(!p)return;
    const hd={data:g('hd')?.value||'',local:g('hl')?.value||'',responsavel:g('hr')?.value||'',obs:g('ho')?.value||''};
    await db.collection('processes').doc(p.id).update({finalizado:true,homologacaoData:hd});
    await logHist(p.id,'finalize',`Processo finalizado. Homologação: ${hd.data||'—'}`);
    gerarPDF({...p,finalizado:true,homologacaoData:hd});
    showAlert('✅ Processo finalizado! PDF gerado.');
  };
  if(g('btn-pdf'))g('btn-pdf').onclick=()=>{gerarPDF(S.processes.find(x=>x.id===S.currentProcess));};

  // FECHAR MODAL
  const close=()=>{S.showModal=false;S.editUserId=null;render();};
  if(g('mx'))g('mx').onclick=close;if(g('mx2'))g('mx2').onclick=close;if(g('mc'))g('mc').onclick=close;
  if(g('mb'))g('mb').onclick=e=>{if(e.target===g('mb'))close();};

  // MODAL NOVO — tabs/tipo/perfil
  on('[data-mtab]','click',e=>{saveFForm();S.modalTab=e.currentTarget.dataset.mtab;render();});
  on('[data-tipo]','click',e=>{saveFForm();S.nf.tipo=e.currentTarget.dataset.tipo;document.querySelectorAll('[data-tipo]').forEach(el=>el.classList.toggle('active',el.dataset.tipo===S.nf.tipo));});
  on('[data-profile]','click',e=>{saveFForm();const k=e.currentTarget.dataset.profile;const idx=S.nf.profiles.indexOf(k);if(idx>=0)S.nf.profiles.splice(idx,1);else S.nf.profiles.push(k);S.newEnabled=defEnabled(S.nf.profiles);document.querySelectorAll('[data-profile]').forEach(el=>el.classList.toggle('active',S.nf.profiles.includes(el.dataset.profile)));});
  if(g('mnext'))g('mnext').onclick=()=>{saveFForm();if(!S.nf.nome.trim()){alert('Preencha o nome.');return;}if(!S.nf.tipo){alert('Selecione o tipo.');return;}if(!S.newEnabled.length)S.newEnabled=defEnabled(S.nf.profiles);S.modalTab='itens';render();};
  if(g('mprev'))g('mprev').onclick=()=>{S.modalTab='dados';render();};
  if(g('msave'))g('msave').onclick=async()=>{
    saveFForm();const f=S.nf;if(!f.nome||!f.tipo){alert('Nome e Tipo são obrigatórios.');return;}
    const fmt=d=>d||'—'; // datas ficam em ISO yyyy-mm-dd
    const novo={nome:f.nome,cargo:f.cargo||'—',depto:f.depto||'—',admissao:fmt(f.admissao),desligamento:fmt(f.desligamento),tipo:f.tipo,aviso:f.aviso,profiles:[...f.profiles],enabledItems:[...S.newEnabled],checks:mkChecks(S.newEnabled),homologacaoData:{data:'',local:'',responsavel:'',obs:''},finalizado:false,criadoEm:new Date().toISOString(),criadoPor:S.session?.name||'—'};
    const ref=await db.collection('processes').add(novo);
    await logHist(ref.id,'create',`Criado por ${novo.criadoPor}`);
    S.showModal=false;showAlert(`✅ Processo criado para ${f.nome}!`);
  };

  // SECTOR BLOCKS
  on('[data-sbo]','click',e=>{const s=e.currentTarget.dataset.sbo;S.secBlockOpen[s]=S.secBlockOpen[s]===false;render();});

  // ITENS NOVO
  on('[data-itg]','change',e=>{const id=e.currentTarget.dataset.itg;if(e.currentTarget.checked){if(!S.newEnabled.includes(id))S.newEnabled.push(id);}else S.newEnabled=S.newEnabled.filter(x=>x!==id);});

  // ITENS EDITAR
  on('[data-eit]','change',async e=>{
    const id=e.currentTarget.dataset.eit;const p=S.processes.find(x=>x.id===S.currentProcess);if(!p)return;
    let ei=[...(p.enabledItems||[])];let checks={...(p.checks||{})};
    if(e.currentTarget.checked){if(!ei.includes(id))ei.push(id);if(!checks[id])checks[id]={done:false,date:'',resp:'',obs:''};} else ei=ei.filter(x=>x!==id);
    await db.collection('processes').doc(p.id).update({enabledItems:ei,checks});render();
  });

  // ADD ITEM NOVO PROCESSO
  on('[data-ai]','click',async e=>{
    const sec=e.currentTarget.dataset.ai;const inp=g('ai-'+sec);const txt=inp?.value.trim();if(!txt)return;
    const ref=await db.collection('items').add({sector:sec,text:txt,conditional:null,order:999});
    S.newEnabled.push(ref.id);inp.value='';render();
  });

  // ADD ITEM EDITAR PROCESSO
  on('[data-aie]','click',async e=>{
    const sec=e.currentTarget.dataset.aie;const inp=g('aie-'+sec);const txt=inp?.value.trim();if(!txt)return;
    const p=S.processes.find(x=>x.id===S.currentProcess);if(!p)return;
    const ref=await db.collection('items').add({sector:sec,text:txt,conditional:null,order:999});
    const ei=[...(p.enabledItems||[]),ref.id];const checks={...(p.checks||{}),[ref.id]:{done:false,date:'',resp:'',obs:''}};
    await db.collection('processes').doc(p.id).update({enabledItems:ei,checks});inp.value='';render();
  });

  // DEL ITEM
  on('[data-dlit]','click',async e=>{if(!confirm('Excluir item?'))return;await db.collection('items').doc(e.currentTarget.dataset.dlit).delete();render();});

  // PERFIS
  on('[data-pt]','click',e=>{S.profileEditTab=e.currentTarget.dataset.pt;render();});
  on('[data-dp]','click',async e=>{
    e.stopPropagation();const key=e.currentTarget.dataset.dp;const pr=S.profiles.find(p=>p.key===key);
    if(!confirm(`Excluir perfil "${pr?.name}"?`))return;
    await db.collection('profiles').doc(key).delete();S.profileEditTab=S.profiles.find(p=>p.key!==key)?.key||'';render();
  });
  if(g('btn-ap'))g('btn-ap').onclick=async()=>{
    const inp=g('npn');const name=inp?.value.trim();if(!name){alert('Digite um nome.');return;}
    if(S.profiles.find(p=>p.name.toLowerCase()===name.toLowerCase())){alert('Nome já existe.');return;}
    const key='p_'+Date.now();await db.collection('profiles').doc(key).set({key,name,order:S.profiles.length+1});
    S.profileEditTab=key;inp.value='';render();
  };
  on('[data-pi]','change',async e=>{
    const id=e.currentTarget.dataset.pi;const key=e.currentTarget.dataset.pk;
    const it=S.iLib.find(x=>x.id===id);if(!it)return;
    let cond=it.conditional===null?null:[...(it.conditional||[])];
    if(cond===null){if(!e.currentTarget.checked)cond=S.profiles.filter(p=>p.key!==key).map(p=>p.key);}
    else{if(e.currentTarget.checked){if(!cond.includes(key))cond.push(key);}else cond=cond.filter(k=>k!==key);if(S.profiles.length&&cond.length===S.profiles.length&&S.profiles.every(p=>cond.includes(p.key)))cond=null;}
    await db.collection('items').doc(id).update({conditional:cond});
  });
  if(g('btn-ali'))g('btn-ali').onclick=async()=>{
    const sec=g('nis')?.value;const txt=g('nit')?.value.trim();const scope=g('nsc')?.value;
    if(!sec){alert('Selecione o setor.');return;}if(!txt){alert('Digite o texto.');return;}
    const ap=S.profiles.find(p=>p.key===S.profileEditTab);
    await db.collection('items').add({sector:sec,text:txt,conditional:scope==='universal'?null:(ap?[ap.key]:[]),order:999});
    if(g('nit'))g('nit').value='';render();
  };
  on('[data-dllib]','click',async e=>{
    if(!confirm('Excluir item da biblioteca?'))return;
    await db.collection('items').doc(e.currentTarget.dataset.dllib).delete();render();
  });

  // ── USUÁRIOS ──────────────────────────────────────────────
  on('[data-edit-user]','click',e=>{S.editUserId=e.currentTarget.dataset.editUser;render();});
  on('[data-del-user]','click',async e=>{
    if(!confirm('Remover usuário?'))return;
    await db.collection('users').doc(e.currentTarget.dataset.delUser).delete();
    showAlert('Usuário removido.','w');render();
  });
  if(g('btn-save-user'))g('btn-save-user').onclick=async()=>{
    const name=g('nu-name')?.value.trim();
    const username=g('nu-user')?.value.trim().toLowerCase();
    const pass=g('nu-pass')?.value;
    const sec=g('nu-sec')?.value;
    const errEl=g('nu-err');
    if(!name||!username||!sec){if(errEl)errEl.textContent='Preencha nome, usuário e setor.';return;}
    const eu=S.editUserId?S.users.find(u=>u.id===S.editUserId):null;
    // Verifica duplicata de username
    const dup=S.users.find(u=>u.username===username&&u.id!==(eu?.id||'__new__'));
    if(dup){if(errEl)errEl.textContent='Usuário já existe.';return;}
    if(!eu&&!pass){if(errEl)errEl.textContent='Defina uma senha.';return;}
    if(pass&&pass.length<6){if(errEl)errEl.textContent='Senha mínima: 6 caracteres.';return;}
    try{
      if(eu){
        // Editar
        const upd={name,username,sectorId:sec,role:sec==='rh'?'rh':'sector'};
        if(pass)upd.passHash=await hashPass(pass);
        await db.collection('users').doc(eu.id).update(upd);
        showAlert(`✅ Usuário ${name} atualizado!`);
      } else {
        // Criar
        const passHash=await hashPass(pass);
        const uid='u_'+Date.now();
        await db.collection('users').doc(uid).set({name,username,passHash,sectorId:sec,role:sec==='rh'?'rh':'sector'});
        showAlert(`✅ Usuário ${name} criado! Login: ${username}`);
      }
      S.editUserId=null;render();
    }catch(e){if(errEl)errEl.textContent='Erro: '+e.message;}
  };

  // ── SETORES ───────────────────────────────────────────────
  on('[data-ds]','click',async e=>{
    const id=e.currentTarget.dataset.ds;const s=getSec(id);
    if(!confirm(`Excluir setor "${s.name}"?`))return;
    await db.collection('sectors').doc(id).delete();showAlert('Setor excluído.','w');render();
  });
  if(g('btn-cs'))g('btn-cs').onclick=async()=>{
    const name=g('ns-name')?.value.trim();const emoji=g('ns-emoji')?.value||'🏢';const color=g('ns-color')?.value||'#666';
    if(!name){alert('Digite o nome.');return;}
    const id='s_'+Date.now();
    await db.collection('sectors').doc(id).set({id,name,emoji,color,order:S.sectors.length+2});
    showAlert(`✅ Setor "${name}" criado!`);render();
  };
}

// ─── BOOT ───────────────────────────────────────────────────
window._onFbReady=async function(){

  db=window._db; // db já disponível via SDK compatfs=window._fs;
  // Verifica se existe usuário RH master; se não, cria automaticamente
  const snap=await db.collection('users').get();
  if(snap.empty){
    const passHash=await hashPass('raguife2025');
    await db.collection('users').doc('rh_master').set({name:'RH Master',username:'rh',passHash,sectorId:'rh',role:'rh'});
  }
  await seedIfEmpty();
  startListeners();
  render();
};
// Com SDK compat, Firebase já está disponível — chamar imediatamente
window._onFbReady();
</script>
</body>
</html>
